<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

  <!-- SEO and OG tags -->
  {% seo %}

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #e5e5e5;
      --text-muted: #737373;
      --text-subtle: #525252;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --border: #1e1e1e;
      --code-bg: #171717;
    }

    .light-theme {
      --bg: #fafafa;
      --text: #171717;
      --text-muted: #525252;
      --text-subtle: #a3a3a3;
      --accent: #ea580c;
      --accent-hover: #f97316;
      --border: #e5e5e5;
      --code-bg: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: transparent;
      border: 1px solid var(--text-subtle);
      color: var(--text-muted);
      padding: 5px 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.2s ease;
      z-index: 1000;
      line-height: 1;
      border-radius: 3px;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .theme-toggle {
        top: 12px;
        right: 12px;
      }
    }

    /* Header Navigation */
    .site-header {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 24px 0;
    }

    .site-nav {
      margin-bottom: 48px;
      padding-bottom: 0;
    }

    /* Hide nav on homepage — the h1 already has the name */
    .layout-default .site-header {
      display: none;
    }

    .site-nav-left a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    .site-nav-left a:hover {
      color: var(--accent);
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 24px 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Add top padding on homepage since nav is hidden */
    .layout-default .container {
      padding-top: 48px;
    }

    /* Post pages */
    .layout-post .container {
      max-width: 640px;
    }

    .layout-post .site-header {
      max-width: 640px;
    }

    /* Page entrance animation */
    main {
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==================== */
    /* HOMEPAGE STYLES      */
    /* ==================== */

    /* Intro Section */
    .intro {
      margin-bottom: 0;
    }

    .intro h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 28px;
      color: var(--text);
    }

    .intro p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .intro p:first-of-type {
      color: var(--text);
      font-size: 1.1rem;
    }

    .intro p:last-child {
      margin-bottom: 0;
    }

    .intro p strong {
      color: var(--text);
      font-weight: 600;
    }

    .intro a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    .intro a:hover {
      color: var(--accent-hover);
    }

    /* Building Section */
    .building {
      margin-bottom: 0;
    }

    .building p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .building p:last-child {
      margin-bottom: 0;
    }

    .building a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .building a:hover {
      color: var(--accent);
    }

    /* Writing Link Section */
    .writing-link {
      margin-bottom: 0;
    }

    .writing-link h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    .writing-link h2 a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .writing-link h2 a:hover {
      color: var(--accent);
    }

    /* Hire Me Section */
    .hire-me {
      margin-bottom: 0;
    }

    .hire-me p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .hire-me p:first-child {
      color: var(--text);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .hire-me p:last-child {
      margin-bottom: 0;
    }

    .hire-me p strong a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .hire-me p strong a:hover {
      color: var(--accent-hover);
    }

    /* Social Links */
    .social-links {
      margin-bottom: 0;
      font-size: 0.95rem;
      color: var(--text-subtle);
      letter-spacing: 0.01em;
    }

    .social-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .social-links a:hover {
      color: var(--accent);
    }

    /* Horizontal Rules */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    /* ==================== */
    /* WRITING PAGE         */
    /* ==================== */

    .writing-hero h1 {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 48px;
      color: var(--text);
    }

    /* Featured / Latest Post */
    .featured-post {
      margin-bottom: 0;
    }

    .featured-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .featured-label::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
    }

    .featured-link {
      text-decoration: none;
      display: block;
    }

    .featured-title {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 20px;
      color: var(--text);
      transition: color 0.2s;
    }

    .featured-link:hover .featured-title {
      color: var(--accent);
    }

    .featured-quote {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 24px;
      max-width: 540px;
    }

    .featured-read {
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .featured-read:hover {
      color: var(--accent-hover);
    }

    /* Previous Posts */
    .previous-posts {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .prev-post {
    }

    .prev-post-title {
      color: var(--text);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
      transition: color 0.2s;
    }

    .prev-post-title:hover {
      color: var(--accent);
    }

    .prev-post-excerpt {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin: 0;
    }

    /* ==================== */
    /* POST PAGES           */
    /* ==================== */

    .post {
      max-width: 100%;
    }

    .post h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
      color: var(--text);
      border-left: 3px solid var(--accent);
      padding-left: 20px;
    }

    .post-date {
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 40px;
      display: block;
      padding-left: 23px;
      letter-spacing: 0.02em;
    }

    .post-content {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text);
    }

    .post-content img {
      max-width: 100%;
      height: auto;
      margin: 40px 0;
      border-radius: 6px;
    }

    .post-content p {
      margin-bottom: 24px;
    }

    .post-content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 48px 0 20px;
      color: var(--text);
    }

    .post-content h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 36px 0 16px;
      color: var(--text);
    }

    .post-content a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s;
    }

    .post-content a:hover {
      color: var(--accent-hover);
    }

    .post-content ul,
    .post-content ol {
      margin-bottom: 24px;
      padding-left: 28px;
    }

    .post-content li {
      margin-bottom: 8px;
    }

    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 20px;
      margin: 32px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .post-content code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85em;
      color: var(--accent);
    }

    .post-content pre,
    .post-content .highlight {
      background: #141414;
      padding: 20px 24px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 32px 0;
      border-left: 3px solid var(--accent);
    }

    .post-content .highlight pre {
      background: transparent;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 0;
    }

    .post-content pre code,
    .post-content .highlight code {
      background: none;
      padding: 0;
      color: #d4d4d4;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .light-theme .post-content pre,
    .light-theme .post-content .highlight {
      background: #f5f5f5;
      border-left-color: var(--accent);
    }

    .light-theme .post-content pre code,
    .light-theme .post-content .highlight code {
      color: #1a1a1a;
    }

    .light-theme .post-content code {
      background: #eee;
      color: var(--accent);
    }

    /* Syntax Highlighting - Dark */
    .highlight .c, .highlight .c1, .highlight .cm { color: #6a737d; }
    .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr { color: #ff7b72; }
    .highlight .s, .highlight .s1, .highlight .s2, .highlight .sb, .highlight .sc, .highlight .sd, .highlight .sh { color: #a5d6ff; }
    .highlight .n, .highlight .na, .highlight .nb, .highlight .nc, .highlight .no { color: #d4d4d4; }
    .highlight .nf, .highlight .nx { color: #d2a8ff; }
    .highlight .mi, .highlight .mf, .highlight .mh, .highlight .mo { color: #79c0ff; }
    .highlight .o, .highlight .p { color: #d4d4d4; }
    .highlight .nt { color: #7ee787; }
    .highlight .nv, .highlight .vi, .highlight .vg { color: #ffa657; }
    .highlight .err { color: #f97316; }

    /* Syntax Highlighting - Light */
    .light-theme .highlight .c, .light-theme .highlight .c1, .light-theme .highlight .cm { color: #6a737d; }
    .light-theme .highlight .k, .light-theme .highlight .kd, .light-theme .highlight .kn, .light-theme .highlight .kp, .light-theme .highlight .kr { color: #cf222e; }
    .light-theme .highlight .s, .light-theme .highlight .s1, .light-theme .highlight .s2, .light-theme .highlight .sb, .light-theme .highlight .sc, .light-theme .highlight .sd, .light-theme .highlight .sh { color: #0a3069; }
    .light-theme .highlight .n, .light-theme .highlight .na, .light-theme .highlight .nb, .light-theme .highlight .nc, .light-theme .highlight .no { color: #1a1a1a; }
    .light-theme .highlight .nf, .light-theme .highlight .nx { color: #8250df; }
    .light-theme .highlight .mi, .light-theme .highlight .mf, .light-theme .highlight .mh, .light-theme .highlight .mo { color: #0550ae; }
    .light-theme .highlight .o, .light-theme .highlight .p { color: #1a1a1a; }
    .light-theme .highlight .nt { color: #116329; }
    .light-theme .highlight .nv, .light-theme .highlight .vi, .light-theme .highlight .vg { color: #953800; }

    /* Post Footer Navigation */
    .post-footer {
      margin-top: 60px;
      margin-bottom: 40px;
    }

    .post-footer a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .post-footer a:hover {
      color: var(--accent-hover);
    }

    /* Footer */
    footer {
      margin-top: auto;
      padding: 40px 0 0;
      color: var(--text-subtle);
      font-size: 0.85rem;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-right a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .footer-right a:hover {
      color: var(--accent);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header {
        padding: 24px 20px 0;
      }

      .site-nav {
        margin-bottom: 32px;
      }

      .container {
        padding: 0 20px 60px;
      }

      hr {
        margin: 32px 0;
      }

      .archive-list li {
        flex-direction: column;
        gap: 5px;
      }

      .archive-list .date {
        min-width: auto;
      }
    }
  </style>
  {% feed_meta %}
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C6K3PKXGS1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C6K3PKXGS1');
  </script>
</head>
<body class="layout-{{ page.layout }}">
  <button class="theme-toggle" onclick="toggleTheme()">Dark</button>

  <header class="site-header">
    <nav class="site-nav">
      <div class="site-nav-left">
        <a href="/">Daniel Bernal</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <main>
      {{ content }}
    </main>

    <footer>
      <div class="footer-content">
        <div class="footer-left">
          <span id="footer-year"></span>
        </div>
        <div class="footer-right">
          <a href="https://flowdeck.studio" target="_blank">FlowDeck</a>
        </div>
      </div>
    </footer>
  </div>
  <script>
    // Get system theme preference
    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    // Apply theme
    function applyTheme(theme) {
      const body = document.body;
      const button = document.querySelector('.theme-toggle');

      if (theme === 'light') {
        body.classList.add('light-theme');
        button.textContent = 'Dark';
      } else {
        body.classList.remove('light-theme');
        button.textContent = 'Light';
      }
    }

    // Toggle theme manually
    function toggleTheme() {
      const currentTheme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';

      applyTheme(newTheme);
      localStorage.setItem('theme-override', newTheme);
    }

    // Initialize theme on page load
    function initTheme() {
      const override = localStorage.getItem('theme-override');
      const theme = override || getSystemTheme();
      applyTheme(theme);

      // Listen for system theme changes (only if no override)
      if (!override) {
        window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
          if (!localStorage.getItem('theme-override')) {
            applyTheme(e.matches ? 'light' : 'dark');
          }
        });
      }
    }

    // Set current year in footer
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Run on page load
    initTheme();
  </script>
</body>
</html>
